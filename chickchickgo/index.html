          <button type="button" data-lightbox-index="0"><img src="../assets/games/chick-chick-go/screenshot-1.png" alt="Chick Chick Go screenshot 1"></button>
          <button type="button" data-lightbox-index="1"><img src="../assets/games/chick-chick-go/screenshot-2.png" alt="Chick Chick Go screenshot 2"></button>
          <button type="button" data-lightbox-index="2"><img src="../assets/games/chick-chick-go/screenshot-3.png" alt="Chick Chick Go screenshot 3"></button>
          <button type="button" data-lightbox-index="3"><img src="../assets/games/chick-chick-go/screenshot-4.png" alt="Chick Chick Go screenshot 4"></button>

  <dialog id="lightbox" class="lightbox"><button class="dialog-close icon-close" aria-label="Close image">&times;</button><div class="lightbox-stage"><button class="lightbox-control previous" aria-label="Previous screenshot">&#8249;</button><img src="" alt="Expanded project image"><button class="lightbox-control next" aria-label="Next screenshot">&#8250;</button></div></dialog>
  <script>
    const screenshotPaths = [
      "../assets/games/chick-chick-go/screenshot-1.png",
      "../assets/games/chick-chick-go/screenshot-2.png",
      "../assets/games/chick-chick-go/screenshot-3.png",
      "../assets/games/chick-chick-go/screenshot-4.png"
    ];
    const lightbox = document.querySelector("#lightbox");
    const lightboxImage = lightbox.querySelector("img");
    let activeScreenshot = 0;

    function showScreenshot(index) {
      activeScreenshot = (index + screenshotPaths.length) % screenshotPaths.length;
      lightboxImage.src = screenshotPaths[activeScreenshot];
      if (!lightbox.open) lightbox.showModal();
    }

    document.querySelectorAll("[data-lightbox-index]").forEach(button => button.addEventListener("click", () => showScreenshot(Number(button.dataset.lightboxIndex))));
    lightbox.querySelector(".previous").addEventListener("click", () => showScreenshot(activeScreenshot - 1));
    lightbox.querySelector(".next").addEventListener("click", () => showScreenshot(activeScreenshot + 1));
    lightbox.querySelector(".dialog-close").addEventListener("click", () => lightbox.close());
    lightbox.addEventListener("click", event => {
      if (event.target === lightbox) lightbox.close();
    });
    addEventListener("keydown", event => {
      if (!lightbox.open) return;
      if (event.key === "ArrowLeft") showScreenshot(activeScreenshot - 1);
      if (event.key === "ArrowRight") showScreenshot(activeScreenshot + 1);
      if (event.key === "Escape") lightbox.close();
    });
  </script>
